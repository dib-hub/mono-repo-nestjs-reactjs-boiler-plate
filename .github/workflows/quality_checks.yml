name: Quality Checks

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  quality:
    # Use a Linux runner for consistent CI behavior.
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      # Pull repository code into the runner.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Install pnpm so workspace commands are available.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      # Set Node.js version and enable pnpm dependency caching.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      # Install all monorepo dependencies from lockfile.
      - name: Install deps
        run: pnpm install --frozen-lockfile

      # Configure Nx base branch to support branch-aware Nx behavior.
      - name: Set Nx base
        run: |
          if [ -n "${{ github.base_ref }}" ]; then
            echo "NX_BASE=origin/${{ github.base_ref }}" >> $GITHUB_ENV
          else
            echo "NX_BASE=origin/${{ github.ref_name }}" >> $GITHUB_ENV
          fi

      # Disable Nx Cloud for this workflow run.
      - name: Disable Nx Cloud
        run: |
          echo "NX_CLOUD=false" >> $GITHUB_ENV
          echo "NX_NO_CLOUD=true" >> $GITHUB_ENV

      # Lint all projects sequentially with verbose logs.
      - name: Lint
        run: pnpm exec nx run-many --target=lint --all --parallel=1 --output-style=stream --verbose

      # Run tests and generate coverage output (tee preserves console log for the PR comment).
      - name: Run tests with coverage
        run: |
          set -o pipefail
          pnpm run test:cov 2>&1 | tee ./coverage.txt

      - name: Jest Coverage Comment
        if: github.event_name == 'pull_request'
        uses: MishaKav/jest-coverage-comment@v1
        with:
          coverage-summary-path: ./coverage/apps/api/coverage-summary.json
          title: Coverage Summary
          summary-title: Per-File Coverage
          badge-title: Coverage
          hide-comment: false
          create-new-comment: false
          hide-summary: false
          coverage-path: ./coverage.txt

      # Upload coverage only in GitHub Actions (skip local act runner).
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: ${{ (success() || failure()) && github.actor != 'nektos/act' }}
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
